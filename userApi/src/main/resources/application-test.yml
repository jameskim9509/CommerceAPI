server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    # 신규 DB / 기존 DB 모두 안전하게 시작할 수 있도록
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: false   # 테스트 환경에서는 flyway clean 허용

mailgun:
  apiKey: ${MAILGUN_APIKEY}
  domain: ${MAILGUN_DOMAIN}

logging:
  level:
    org.hibernate.SQL: DEBUG
    com.zerobase.userApi: DEBUG
