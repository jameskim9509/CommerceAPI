server:
  port: 8080

spring:
  application:
    name: user-api
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    # 신규 DB / 기존 DB 모두 안전하게 시작할 수 있도록
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: false   # 테스트 환경에서는 flyway clean 허용

# ADR-007: 메일(Gmail SMTP)은 application.yml(base) 공통 설정을 사용.
#          자격증명은 MAIL_USERNAME / MAIL_PASSWORD 환경변수로 주입 (docker-compose.test.yml · k8s Secret).

# ADR-005: Eureka 클라이언트 등록
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    # 다인스턴스 환경에서 인스턴스별 고유 식별자
    instance-id: ${spring.application.name}:${spring.cloud.client.hostname:${HOSTNAME:localhost}}:${server.port}

logging:
  level:
    org.hibernate.SQL: DEBUG
    com.zerobase.userApi: DEBUG
    com.netflix.discovery: INFO
