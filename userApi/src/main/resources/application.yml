server:
  port: 8080

spring:
  application:
    name: user-api
  datasource:
    url: jdbc:mysql://commerce-mysql.c90qy2aumeaj.ap-northeast-2.rds.amazonaws.com:3306/user
    username: commerce
    password: commerce

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # ADR-003: Choreography SAGA — Kafka producer/consumer
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: userapi-saga
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  # ADR-007: Gmail SMTP(App Password) 이메일 발송. 자격증명은 환경변수(MAIL_USERNAME / MAIL_PASSWORD)로만 주입한다.
  #          로컬은 .vscode/.env.local (VS Code launch.json envFile, 커밋 금지) 에서 주입.
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        # 회원가입 트랜잭션이 SMTP 지연에 무한정 묶이지 않도록 타임아웃(ms)
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

# ADR-005: Eureka 클라이언트 등록
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.cloud.client.hostname:${HOSTNAME:localhost}}:${server.port}