# =============================================================================
# userApi 통합 테스트 프로파일 (gradle test 에서 @ActiveProfiles("test") 로 활성화)
#  - application.yml 의 H2 + JPA 기본 설정 위에 덧붙는다.
#  - Flyway 마이그레이션은 MySQL 전용 문법(BIT(1), ENGINE=InnoDB)을 사용하므로
#    H2 환경에서는 비활성화하고, JPA ddl-auto 로 스키마를 생성한다.
# =============================================================================

spring:
  flyway:
    enabled: false
