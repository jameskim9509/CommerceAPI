server:
  port: 8090

spring:
  driver-class-name: org.h2.Driver
  url: jdbc:h2:~test
  username: commerce
  password: commerce

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true

  # 운영 마이그레이션(V1__init.sql 등) 은 MySQL 전용 문법(BIT(1), ENGINE=InnoDB)을 쓰므로
  # 테스트(H2) 에서는 Flyway 를 끄고 JPA ddl-auto 로 스키마를 만든다.
  flyway:
    enabled: false

  # broker 없이도 @SpringBootTest 컨텍스트가 부팅되도록 리스너 자동 시작 OFF
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: test
    listener:
      auto-startup: false

# Outbox poller 도 broker 가 없으니 테스트에서는 끈다 (ADR-004)
outbox:
  poller:
    enabled: false