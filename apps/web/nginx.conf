# apps/web SPA + /api → gateway 컨테이너 프록시 (docker-compose 내부 DNS).
# docker-compose.test.yml 의 commerce-test 네트워크에서 gateway:80 으로 통신.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: /customer/*, /seller/* 등 클라이언트 라우팅을 모두 index.html 로
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/x → gateway:80/x (gateway 가 /user/**, /order/** 라우트 정의)
    location /api/ {
        proxy_pass http://gateway:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 정적 자산 장기 캐시
    location ~* \.(js|css|woff2?|ttf|svg|png|jpe?g|gif|ico)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
