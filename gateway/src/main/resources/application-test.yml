server:
  port: 80

spring:
  cloud:
    gateway:
      routes:
        - id: user-api
          uri: ${USER_API_URI}
          predicates:
            - Path=/user/**
          filters:
            - RewritePath=/user/(?<path>.*), /$\{path}
        - id: order-api
          uri: ${ORDER_API_URI}
          predicates:
            - Path=/order/**
          filters:
            - RewritePath=/order/(?<path>.*), /$\{path}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG
