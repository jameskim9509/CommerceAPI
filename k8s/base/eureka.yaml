# 서비스 디스커버리 레지스트리 (ADR-005). 단일 인스턴스.
# 이미지(commerce-eureka)는 prod overlay 가 ECR 로 매핑한다. (CICD 에 push 추가 필요 — README 참고)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka
  labels:
    app: eureka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka
  template:
    metadata:
      labels:
        app: eureka
    spec:
      containers:
        - name: eureka
          image: commerce-eureka
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=70.0"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /
              port: 8761
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8761
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8761
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: eureka
  labels:
    app: eureka
spec:
  selector:
    app: eureka
  ports:
    - port: 8761
      targetPort: 8761
