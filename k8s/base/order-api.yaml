# 상품 카탈로그 + 장바구니/주문. MySQL(orders) + Redis(장바구니) + Kafka(SAGA/Outbox).
# 핫패스라 base replicas 를 가장 크게(3) 둔다. 결제는 USER_API_URL(gateway 경유) 로 호출.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-api
  labels:
    app: order-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: order-api
  template:
    metadata:
      labels:
        app: order-api
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: order-api
          image: commerce-orderapi
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: commerce-config
            - secretRef:
                name: commerce-secret
          env:
            - name: MYSQL_HOST
              value: "mysql-order"
            - name: MYSQL_DATABASE
              value: "orders"
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 40
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: order-api
  labels:
    app: order-api
spec:
  selector:
    app: order-api
  ports:
    - port: 8080
      targetPort: 8080
