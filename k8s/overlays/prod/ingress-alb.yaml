# 외부 진입 — AWS Load Balancer Controller 가 이 Ingress 로 ALB 를 프로비저닝.
# / 전체를 web 으로 전달(경로 분기·rewrite 없음). web nginx 가 정적 SPA 를 서빙하고
# /api/** 를 gateway 로 프록시(/api 제거) — gateway 는 내부 ClusterIP, ALB 직접 노출 안 함.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: commerce
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    # web 의 '/' 는 index.html(200) 을 돌려주므로 단순 200 헬스체크로 충분.
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/success-codes: "200"
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
