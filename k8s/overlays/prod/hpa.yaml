# CPU 사용률 70%(requests 기준) 기반 수평 확장. metrics-server 필요.
# Node 층은 EKS Cluster Autoscaler / Karpenter 가 Pending pod 에 맞춰 EC2 노드를 자동 증감.
# (kustomization 의 'replicas remove' 패치가 정적 replicas 를 제거하므로, 외부 진입 web 도
#  여기서 HPA 가 소유해야 prod 에서 1 로 떨어지지 않는다 — 단일 진입점 SPOF 방지)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
