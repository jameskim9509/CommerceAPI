# 운영 자격증명 placeholder. 실제로는 평문 커밋 대신 External Secrets Operator /
# AWS Secrets Manager / SSM Parameter Store 로 주입하는 것을 권장(README 참고).
# MySQL 은 RDS(관리형)라 ROOT_PASSWORD 는 앱에서 사용하지 않는다(앱은 USER/PASSWORD 만).
apiVersion: v1
kind: Secret
metadata:
  name: commerce-secret
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "UNUSED_WITH_MANAGED_RDS"
  MYSQL_USER: "REPLACE_ME"
  MYSQL_PASSWORD: "REPLACE_ME"
  MAIL_USERNAME: "REPLACE_ME"
  MAIL_PASSWORD: "REPLACE_ME"
